# DEVICES
__root_device:
  root:
    path: /
    type: disk
    pool: "default"
    size: "{{ lxd_vm_root_size }}"

__docker_device_data:
  docker:
    path: /var/lib/docker
    source: "{{ zfsdocker_zvol }}"
    type: disk
    "raw.mount.options": user_subvol_rm_allowed

__docker_device: "{{ __docker_device_data if lxd_vm_docker else {} }}"

lxd_vm_default_devices: "{{ __root_device | combine(__docker_device) }}"


# PROFILES
lxd_vm_default_profiles:
  - default


# CONFIG
__base_config: {}

__docker_config: "{{ {'security.nesting': 'true'} if lxd_vm_docker else {} }}"

lxd_vm_default_config: "{{ __base_config | combine(__docker_config) }}"
