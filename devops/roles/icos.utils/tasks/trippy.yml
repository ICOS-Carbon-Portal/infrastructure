- when: trippy_version is not defined
  run_once: true
  check_mode: false
  delegate_to: localhost
  delegate_facts: true
  block:

  - name: Find the latest release of trippy
    uri:
      url: https://api.github.com/repos/fujiapple852/trippy/releases/latest
      return_content: true
    register: gh

  - name: Set trippy_version fact
    set_fact:
      trippy_version: "{{ gh.json.tag_name.lstrip('v') }}"
      cacheable: true

- name: Install trippy
  unarchive:
    remote_src: true
    src: "{{ trippy_url_map[ansible_architecture] }}"
    dest: /usr/local/bin
    extra_opts:
      - "--strip-components=1"

- name: Check that trippy is executable and the correct version
  shell: trip --version
  changed_when: no
  register: _r
  failed_when: "not _r.stdout.endswith(trippy_version)"

- name: Which version of trippy was installed
  debug:
    msg: "Installed {{ trippy_version }}"
