- name: Check wordpress_sites is not empty
  assert:
    that:
      - wordpress_sites | length > 0

- name: Check wordpress site definitions
  assert:
    that:
      - item.name is match('^[a-z0-9][a-z0-9_-]*$')
      - item.db_name | default(item.name ~ '_wordpress') is match('^[a-z0-9][a-z0-9_]*$')
      - item.db_user | default(item.name ~ '_wordpress') is match('^[a-z0-9][a-z0-9_]*$')
      - item.domains is defined
      - item.domains | length > 0
      - item.db_password is defined
      - item.db_root_password is defined
    fail_msg: "Each wordpress site needs name, domains, db_password, and db_root_password"
  loop: "{{ wordpress_sites }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true

- name: Reset normalized wordpress site config
  set_fact:
    wordpress_site_configs: []

- name: Set normalized wordpress site config
  set_fact:
    wordpress_site_configs: >-
      {{ wordpress_site_configs + [item | combine({
        'db_name': _db_name,
        'db_user': _db_user,
        'db_host': _db_host,
        'static_files': item.static_files | default([]),
        'wp_db_config': [
          {'name': 'DB_NAME', 'value': _db_name},
          {'name': 'DB_USER', 'value': _db_user},
          {'name': 'DB_HOST', 'value': _db_host},
          {'name': 'DB_PASSWORD', 'value': item.db_password}
        ]
      })] }}
  vars:
    _db_name: "{{ item.db_name | default(item.name ~ '_wordpress') }}"
    _db_user: "{{ item.db_user | default(item.name ~ '_wordpress') }}"
    _db_host: "{{ item.name }}-db"
  loop: "{{ wordpress_sites }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true

- name: Check wordpress static file definitions
  assert:
    that:
      - item.1.path is match('^[^/].*')
      - item.1.path is not search('(^|/)\.\.(/|$)')
      - item.1.content is defined
    fail_msg: "WordPress static file paths must be relative, stay inside the site root, and define content"
  loop: "{{ query('subelements', wordpress_site_configs, 'static_files') }}"
  loop_control:
    label: "{{ item.0.name }}/{{ item.1.path | default('') }}"
  no_log: true

- name: Create wordpress home
  file:
    path: "{{ wordpress_home }}"
    state: directory
    mode: "0755"

- name: Create wordpress proxy directory
  file:
    path: "{{ wordpress_home }}/proxy"
    state: directory
    mode: "0755"

- name: Create wordpress site directories
  file:
    path: "{{ wordpress_home }}/sites/{{ item.0.name }}/{{ item.1 }}"
    state: directory
    mode: "0755"
  loop: "{{ wordpress_site_configs | product(['html', 'db']) }}"
  loop_control:
    label: "{{ item.0.name }}/{{ item.1 }}"

- name: Create shared wordpress network
  community.docker.docker_network:
    name: "{{ wordpress_network_name }}"

- name: Create wordpress static file directories
  file:
    path: "{{ wordpress_home }}/sites/{{ item.0.name }}/html/{{ item.1.path | dirname }}"
    state: directory
    mode: "0755"
  loop: "{{ query('subelements', wordpress_site_configs, 'static_files') }}"
  loop_control:
    label: "{{ item.0.name }}/{{ item.1.path | dirname }}"

- name: Copy wordpress static files
  copy:
    dest: "{{ wordpress_home }}/sites/{{ item.0.name }}/html/{{ item.1.path }}"
    content: "{{ item.1.content }}"
    mode: "{{ item.1.mode | default('0644') }}"
  loop: "{{ query('subelements', wordpress_site_configs, 'static_files') }}"
  loop_control:
    label: "{{ item.0.name }}/{{ item.1.path }}"

- name: Check for existing wp-config.php
  stat:
    path: "{{ wordpress_home }}/sites/{{ item.name }}/html/wp-config.php"
  loop: "{{ wordpress_site_configs }}"
  loop_control:
    label: "{{ item.name }}"
  register: _wordpress_wp_configs

- name: Check for existing wp-content directories
  stat:
    path: "{{ wordpress_home }}/sites/{{ item.name }}/html/wp-content"
  loop: "{{ wordpress_site_configs }}"
  loop_control:
    label: "{{ item.name }}"
  register: _wordpress_wp_content_dirs

- name: Make wp-content writable by WordPress
  file:
    path: "{{ item.stat.path }}"
    owner: "{{ wordpress_web_owner }}"
    group: "{{ wordpress_web_group }}"
    state: directory
    recurse: true
  loop: "{{ _wordpress_wp_content_dirs.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: item.stat.exists

- name: Configure restored WordPress sites for reverse proxy
  blockinfile:
    path: "{{ item.stat.path }}"
    marker: "// {mark} ANSIBLE MANAGED WORDPRESS PROXY"
    insertbefore: "^(?:/\\* That's all|require_once)"
    block: |
      if (isset($_SERVER['HTTP_X_FORWARDED_PROTO']) && $_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
          $_SERVER['HTTPS'] = 'on';
          $_SERVER['SERVER_PORT'] = 443;
      }

      if (!defined('FS_METHOD')) {
          define('FS_METHOD', 'direct');
      }

      $wordpress_allowed_hosts = array({% for domain in item.item.domains %}{{ domain | to_json }}{{ ',' if not loop.last else '' }}{% endfor %});
      if (isset($_SERVER['HTTP_HOST']) && in_array($_SERVER['HTTP_HOST'], $wordpress_allowed_hosts, true)) {
          if (!defined('WP_HOME')) {
              define('WP_HOME', 'https://' . $_SERVER['HTTP_HOST']);
          }
          if (!defined('WP_SITEURL')) {
              define('WP_SITEURL', 'https://' . $_SERVER['HTTP_HOST']);
          }
      }
  loop: "{{ _wordpress_wp_configs.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: item.stat.exists

- name: Configure restored WordPress database settings
  replace:
    path: "{{ item.0.stat.path }}"
    regexp: "define\\(\\s*['\"]{{ item.1.name }}['\"]\\s*,\\s*['\"][^'\"]*['\"]\\s*\\);"
    replace: 'define(''{{ item.1.name }}'', {{ item.1.value | to_json | replace(''$'', ''\$'') }});'
  loop: "{{ query('subelements', _wordpress_wp_configs.results | selectattr('stat.exists') | list, 'item.wp_db_config') }}"
  loop_control:
    label: "{{ item.0.item.name }} {{ item.1.name }}"
  no_log: true

- name: Copy Caddyfile
  template:
    src: Caddyfile.j2
    dest: "{{ wordpress_home }}/proxy/Caddyfile"
    mode: "0644"
  register: _wordpress_caddyfile

- name: Copy proxy docker-compose.yml
  template:
    src: proxy-docker-compose.yml.j2
    dest: "{{ wordpress_home }}/proxy/docker-compose.yml"
    mode: "0644"
  register: _wordpress_proxy_compose

- name: Copy site docker-compose.yml
  template:
    src: site-docker-compose.yml.j2
    dest: "{{ wordpress_home }}/sites/{{ item.name }}/docker-compose.yml"
    mode: "0600"
  loop: "{{ wordpress_site_configs }}"
  loop_control:
    label: "{{ item.name }}"
  register: _wordpress_site_compose
  no_log: true

- name: Check for legacy wordpress compose file
  stat:
    path: "{{ wordpress_home }}/docker-compose.yml"
  register: _wordpress_legacy_compose

- name: Stop legacy wordpress compose project
  community.docker.docker_compose_v2:
    project_src: "{{ wordpress_home }}"
    state: absent
  when: _wordpress_legacy_compose.stat.exists

- name: Remove legacy wordpress compose files
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ wordpress_home }}/docker-compose.yml"
    - "{{ wordpress_home }}/Caddyfile"

- name: Check wordpress proxy Caddyfile mount
  command: >-
    docker inspect -f {% raw %}'{{ range .Mounts }}{{ if eq .Destination "/etc/caddy/Caddyfile" }}{{ .Source }}{{ end }}{{ end }}'{% endraw %} wordpress_proxy
  register: _wordpress_proxy_caddyfile_mount
  failed_when: false
  changed_when: false

- name: Check wordpress proxy Caddyfile content
  shell: |
    set -Euo pipefail
    docker exec wordpress_proxy cat /etc/caddy/Caddyfile | cmp -s "{{ wordpress_home }}/proxy/Caddyfile" -
  args:
    executable: /bin/bash
  register: _wordpress_proxy_caddyfile_content
  failed_when: false
  changed_when: false

- name: Start wordpress site containers
  community.docker.docker_compose_v2:
    project_src: "{{ wordpress_home }}/sites/{{ item.name }}"
    state: present
    pull: always
  loop: "{{ wordpress_site_configs }}"
  loop_control:
    label: "{{ item.name }}"

- name: Wait for wordpress database containers
  shell: |
    set -Eueo pipefail
    root_password=$(docker exec wordpress_{{ item.name }}_db printenv MARIADB_ROOT_PASSWORD)
    docker exec -e MYSQL_PWD="$root_password" wordpress_{{ item.name }}_db mariadb-admin ping -uroot --silent
  args:
    executable: /bin/bash
  loop: "{{ wordpress_site_configs }}"
  loop_control:
    label: "{{ item.name }}"
  register: _wordpress_db_ready
  until: _wordpress_db_ready.rc == 0
  retries: 30
  delay: 5
  changed_when: false
  no_log: true

- name: Enforce wordpress database users and grants
  shell: |
    set -Eueo pipefail
    app_password=$(docker exec wordpress_{{ item.name }}_db printenv MARIADB_PASSWORD)
    app_password_sql=$(printf '%s' "$app_password" | sed "s/\\\\/\\\\\\\\/g; s/'/''/g")

    docker exec -i -e MYSQL_PWD="$MYSQL_PWD" wordpress_{{ item.name }}_db mariadb -uroot <<'SQL'
    CREATE DATABASE IF NOT EXISTS `{{ item.db_name }}` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    SQL

    docker exec -i -e MYSQL_PWD="$MYSQL_PWD" wordpress_{{ item.name }}_db mariadb -uroot <<SQL
    CREATE USER IF NOT EXISTS '{{ item.db_user }}'@'%' IDENTIFIED BY '$app_password_sql';
    ALTER USER '{{ item.db_user }}'@'%' IDENTIFIED BY '$app_password_sql';
    SQL

    docker exec -i -e MYSQL_PWD="$MYSQL_PWD" wordpress_{{ item.name }}_db mariadb -uroot <<'SQL'
    GRANT ALL PRIVILEGES ON `{{ item.db_name }}`.* TO '{{ item.db_user }}'@'%';
    FLUSH PRIVILEGES;
    SQL
  args:
    executable: /bin/bash
  environment:
    MYSQL_PWD: "{{ item.db_root_password }}"
  loop: "{{ wordpress_site_configs }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true
  changed_when: true

- name: Remove legacy wordpress database user
  shell: |
    docker exec -i -e MYSQL_PWD="$MYSQL_PWD" wordpress_{{ item.name }}_db mariadb -uroot <<'SQL'
    DROP USER IF EXISTS 'wordpress'@'%';
    FLUSH PRIVILEGES;
    SQL
  args:
    executable: /bin/bash
  environment:
    MYSQL_PWD: "{{ item.db_root_password }}"
  loop: "{{ wordpress_site_configs }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.db_user != 'wordpress'
  no_log: true
  changed_when: true

- name: Start wordpress proxy containers
  community.docker.docker_compose_v2:
    project_src: "{{ wordpress_home }}/proxy"
    state: present
    pull: always
    recreate: "{{ 'always' if _wordpress_caddyfile.changed or _wordpress_proxy_compose.changed or _wordpress_proxy_caddyfile_mount.stdout != wordpress_home ~ '/proxy/Caddyfile' or _wordpress_proxy_caddyfile_content.rc != 0 else 'auto' }}"

- name: Reload wordpress proxy configuration
  command: docker exec wordpress_proxy caddy reload --config /etc/caddy/Caddyfile
  changed_when: _wordpress_caddyfile.changed
