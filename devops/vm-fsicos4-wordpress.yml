- hosts: fsicos4
  vars:
    wordpress_domains:
      - envri.eu
      - preview.st4ris.eu
    wordpress_enable_production_domains: true
  roles:
    - role: icos.pve_server
      tags: pve_server
  tasks:
    - name: Synchronize VM SSH port forwarding
      tags: guest
      command: icos-auto-dnat run
      register: _wordpress_auto_dnat
      changed_when: >-
        'adding port' in _wordpress_auto_dnat.stdout or
        'removing rule' in _wordpress_auto_dnat.stdout

    - name: Configure wordpress reverse proxy
      tags: caddy
      include_role:
        name: icos.caddy
        apply:
          tags: caddy
      vars:
        caddy_name: wordpress
        caddy_conf: |
          {% if wordpress_enable_production_domains %}
          {{ wordpress_domains | join(', ') }} {
              reverse_proxy {{ hostvars['fsicos4-wordpress'].nebula_ip }}:80 {
                  header_up X-Forwarded-For {remote_host}
                  header_up X-Real-IP {remote_host}
              }
          }
          {% endif %}


- hosts: fsicos4-wordpress
  vars:
    wordpress_home: /docker/wordpress
    wordpress_sites:
      - name: envri
        domains:
          - envri.eu
        db_name: envri
        db_user: envri
        db_password: "{{ vault_wordpress_envri_db_password }}"
        db_root_password: "{{ vault_wordpress_envri_db_root_password }}"
        static_files:
          - path: .well-known/security.txt
            content: |
              Contact: mailto:security@envri.eu
              Expires: 2027-04-14T00:00:00.000Z
              Preferred-Languages: en
              Canonical: https://envri.eu/.well-known/security.txt
              Policy: https://envri.eu/.well-known/security-policy.html
          - path: .well-known/security-policy.html
            content: |
              <!doctype html>
              <html lang="en">
              <head>
                <meta charset="utf-8">
                <meta name="viewport" content="width=device-width, initial-scale=1">
                <title>ENVRI Security Policy</title>
              </head>
              <body>
                <main>
                  <h1>ENVRI Security Policy</h1>
                  <p>The ENVRI consortium takes the security of its systems and data seriously. If you believe you have found a security vulnerability in any ENVRI-operated service, we encourage you to report it responsibly.</p>
                  <p>How to report: Send your findings to <a class="autolink" href="mailto:security@envri.eu">security@envri.eu</a>. Please include a description of the vulnerability, steps to reproduce, and any supporting evidence (screenshots, logs, URLs).</p>
                  <p>What to expect: We will acknowledge receipt within 5 business days and aim to provide an initial assessment within 15 business days.</p>
                  <p>Scope: All services and applications under *.envri.eu.</p>
                  <p>Important: ENVRI does not currently operate a bug bounty program and cannot offer financial rewards. However, all responsibly disclosed findings are welcome and appreciated. </p>
                  <p>We ask that you: Do not access or modify data belonging to other users. Do not degrade the availability of our services. Allow reasonable time for remediation before public disclosure.</p>
                </main>
              </body>
              </html>
      - name: st4ris
        domains:
          - preview.st4ris.eu
        db_name: st4ris
        db_user: st4ris
        db_password: "{{ vault_wordpress_st4ris_db_password }}"
        db_root_password: "{{ vault_wordpress_st4ris_db_root_password }}"
  roles:
    - role: icos.pve_guest
      tags: guest

    - role: icos.utils
      tags: utils

    - role: icos.python3
      tags: python3

    - role: icos.docker2
      tags: docker

    - role: icos.nebula
      tags: nebula

    - role: icos.wordpress
      tags: wordpress

    - role: icos.bbclient2
      tags: bbclient
      bbclient_name: fsicos4-wordpress
      bbclient_home: /opt/bbclient-fsicos4-wordpress
      bbclient_remotes:
        - icos1
      bbclient_timer_conf: |
        OnCalendar=*-*-* 03:00:00
        RandomizedDelaySec=30m
      bbclient_timer_content: |
        #!/bin/bash
        set -Eueo pipefail

        cd {{ wordpress_home }}

        compose_down() {
          for project in proxy sites/*; do
            if [[ -f "$project/docker-compose.yml" ]]; then
              (cd "$project" && docker compose down)
            fi
          done
        }

        compose_up() {
          for project in sites/* proxy; do
            if [[ -f "$project/docker-compose.yml" ]]; then
              (cd "$project" && docker compose up -d)
            fi
          done
        }

        trap compose_up EXIT

        compose_down
        {{ bbclient_all }} create --stats --verbose "::{now}" {{ wordpress_home }}
        {{ bbclient_all }} prune --stats --list --keep-daily=14 --keep-weekly=50 --keep-monthly=36
        {{ bbclient_all }} compact --verbose
