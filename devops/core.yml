- hosts: core_server
  tasks:
    - name: Setup core caddy proxy
      tags:
        - proxy
        - caddy
        - core_caddy_proxy
        - cpmeta_proxy
        - cpdata_proxy
        - cpauth_proxy
        - restheart_proxy
        - doi_proxy
      import_role:
        name: icos.caddy
      vars:
        caddy_name: "{{ core_caddy_name }}"
        caddy_conf: "{{ core_caddy_conf }}"
      when: core_proxy | default('nginx') == 'caddy'

    - name: Setup cpmeta proxy
      tags:
        - proxy
        - cpmeta_proxy
      import_role:
        name: icos.cpmeta
        tasks_from: proxy.yml
      when: core_proxy | default('nginx') == 'nginx'

    - name: Setup cpdata proxy
      tags:
        - proxy
        - cpdata_proxy
      import_role:
        name: icos.cpdata
        tasks_from: proxy.yml
      when: core_proxy | default('nginx') == 'nginx'

    - name: Setup cpauth proxy
      tags:
        - proxy
        - cpauth_proxy
      import_role:
        name: icos.cpauth
        tasks_from: proxy.yml
      when:
        - core_proxy | default('nginx') == 'nginx'
        - cpauth_domains is defined

    - name: Setup restheart proxy
      tags:
        - proxy
        - restheart_proxy
      import_role:
        name: icos.restheart
        tasks_from: proxy.yml
      when: core_proxy | default('nginx') == 'nginx'

    - name: Setup doi proxy
      tags:
        - proxy
        - doi_proxy
      import_role:
        name: icos.doi
        tasks_from: proxy.yml
      when:
        - core_proxy | default('nginx') == 'nginx'
        - doi_certbot_name is defined

- hosts: core_host
  pre_tasks:
    - name: Setup java
      tags:
        - java
        - cpmeta_setup
        - cpdata_setup
        - cpauth_setup
      import_role:
        name: icos.java

    - name: Setup rdflog
      tags: rdflog
      import_role:
        name: icos.rdflog
        tasks_from: setup.yml

    - name: Setup rdflog backup
      tags: rdflog_backup
      import_role:
        name: icos.rdflog
        tasks_from: backup.yml

  roles:
    - role: icos.postgis
      tags: postgis

    - role: icos.restheart
    - role: icos.cpmeta
    - role: icos.cpdata
    - role: icos.cpauth
      when: cpauth_envries is defined
    - role : icos.doi
    - role: icos.virtuoso
      tags: virtuoso
      when: virtuoso_enable | default(False)


# After this playbook has ran, deploy the jar-files of cpmeta, cpdata and (if needed) cpauth and doi using sbt
